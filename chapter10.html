<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 10 — I Think I Should Go</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --sans: 'Inter', sans-serif;
      --serif: 'Cormorant Garamond', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: var(--serif);
      color: rgba(220, 210, 195, .85);
    }

    #grain-canvas,
    #rain-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #grain-canvas {
      z-index: 6;
    }

    #rain-canvas {
      z-index: 5;
      opacity: 0;
      transition: opacity 3s ease;
    }

    .vhs-lines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0, 0, 0, .1) 2px, rgba(0, 0, 0, .1) 4px);
      pointer-events: none;
      z-index: 7;
    }

    #black-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      transition: opacity 2.5s ease;
    }

    #start-prompt {
      font-family: var(--sans);
      font-size: .6rem;
      letter-spacing: .3em;
      color: rgba(200, 133, 74, .3);
      text-transform: uppercase;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: .3;
      }

      50% {
        opacity: .7;
      }
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: radial-gradient(ellipse at 50% 25%, #190e07 0%, #0a0604 60%, #000 100%);
      opacity: 0;
      transition: opacity 3s ease;
    }

    #lamp-glow {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      background: radial-gradient(ellipse, rgba(180, 120, 60, .07) 0%, transparent 70%);
      transition: opacity 5s ease;
      z-index: 1;
    }

    #photo-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(300px, 65vw);
      aspect-ratio: 3/4;
      z-index: 15;
      opacity: 0;
      transition: opacity 4s ease, filter 6s ease;
      filter: grayscale(70%) brightness(.4) blur(10px) sepia(.3);
    }

    #photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, .04);
    }

    #text-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
      pointer-events: none;
    }

    .caption {
      font-family: var(--serif);
      color: rgba(220, 205, 185, .9);
      text-align: center;
      opacity: 0;
      line-height: 1.75;
      transition: opacity 1.6s ease;
      white-space: pre-line;
      max-width: min(720px, 90vw);
    }

    .caption.xs {
      font-size: clamp(.75rem, 1.5vw, .9rem);
      color: rgba(200, 170, 130, .55);
    }

    .caption.sm {
      font-size: clamp(.9rem, 2vw, 1.1rem);
      color: rgba(210, 185, 155, .75);
    }

    .caption.md {
      font-size: clamp(1.2rem, 3vw, 1.85rem);
      font-style: italic;
    }

    .caption.lg {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-style: italic;
    }

    .caption.xl {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 300;
      letter-spacing: .05em;
    }

    .caption.title {
      font-size: clamp(1.8rem, 6vw, 3.8rem);
      font-weight: 300;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(225, 210, 190, 1);
    }

    .caption.sub {
      font-size: clamp(.85rem, 1.8vw, 1.1rem);
      font-style: italic;
      color: rgba(200, 149, 108, .6);
    }

    #ch-label {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 60;
      font-family: var(--sans);
      font-size: .52rem;
      letter-spacing: .35em;
      color: rgba(200, 133, 74, .2);
      opacity: 0;
      transition: opacity 2s ease;
      text-transform: uppercase;
    }

    #clock-dot {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 60;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(200, 133, 74, .3);
      opacity: 0;
      transition: opacity 2s ease;
    }

    #clock-dot.ticking {
      opacity: 1;
      animation: tick 1s steps(1) infinite;
    }

    @keyframes tick {

      0%,
      49% {
        opacity: .4;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    #memory-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .mem-text {
      position: absolute;
      font-family: var(--serif);
      font-size: clamp(.7rem, 1.4vw, .88rem);
      font-style: italic;
      color: rgba(200, 149, 108, .28);
      opacity: 0;
      transition: opacity 2.5s ease;
    }

    #final-fade {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 6s ease;
    }

    .cinematic-nav {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 250;
      opacity: 0;
      display: flex;
      gap: 16px;
      align-items: center;
      transition: opacity 3s ease;
      pointer-events: none;
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .3em;
      color: rgba(200, 133, 74, .5);
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 8px;
    }

    .nav-btn:hover {
      color: rgba(200, 133, 74, .9);
    }

    .nav-divider {
      width: 40px;
      height: 1px;
      background: rgba(200, 133, 74, .2);
    }

    #skip-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 300;
      background: transparent;
      border: 1px solid rgba(200, 133, 74, .15);
      color: rgba(200, 133, 74, .35);
      font-family: var(--sans);
      font-size: .58rem;
      letter-spacing: .2em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s, border-color .3s, color .3s;
      text-transform: uppercase;
    }

    #skip-btn.active {
      opacity: .6;
      pointer-events: auto;
    }

    #skip-btn.active:hover {
      opacity: 1;
      border-color: rgba(200, 133, 74, .6);
      color: rgba(200, 133, 74, .9);
    }
  </style>
</head>

<body>

  <div class="transition-overlay"></div>

  <canvas id="grain-canvas"></canvas>
  <canvas id="rain-canvas"></canvas>

    <div id="start-prompt">klik di mana saja untuk memulai</div>

  <div id="scene">

  </div>

  <nav class="cinematic-nav" id="main-nav">

  <button id="skip-btn" onclick="skipTimeline()">skip</button>

  <script src="js/script.js"></script>
  <script>
    (() => {
      const wait = ms => new Promise(r => setTimeout(r, ms));
      const layer = document.getElementById('text-layer');
      const ac = () => window.audioController;
      let activeCaption = null;
      window.__ch10Skip = false;

      /* ── Caption helpers ── */
      function showCaption(text, cls, dur) {
        return new Promise(async r => {
          if (window.__ch10Skip) { r(); return; }
          if (activeCaption) {
            activeCaption.style.opacity = '0';
            await wait(900);
            if (activeCaption) { activeCaption.remove(); activeCaption = null; }
          }
          if (window.__ch10Skip) { r(); return; }
          const el = document.createElement('div');
          el.className = `caption ${cls}`;
          el.textContent = text;
          layer.appendChild(el);
          activeCaption = el;
          await wait(80);
          if (window.__ch10Skip) { r(); return; }
          el.style.opacity = '1';
          await wait(dur || 3500);
          r();
        });
      }
      async function hideCaption() {
        if (!activeCaption || window.__ch10Skip) return;
        activeCaption.style.opacity = '0';
        await wait(1800);
        if (activeCaption) { activeCaption.remove(); activeCaption = null; }
      }

      /* ── Skip ── */
      window.skipTimeline = () => {
        window.__ch10Skip = true;
        document.getElementById('skip-btn')?.classList.remove('active');
        if (activeCaption) { activeCaption.remove(); activeCaption = null; }
        stopClock();
        const bs = document.getElementById('black-screen');
        if (bs) { bs.style.opacity = '0'; bs.style.pointerEvents = 'none'; }
        const ff = document.getElementById('final-fade');
        if (ff) { ff.style.transition = 'opacity 1.5s ease'; ff.style.opacity = '1'; }
        if (ac()) { ac().fadePiano(0, 1500); ac().fadeTrack('rain', 0, 2000); ac().fadeTrack('breathing', 0, 1500); }
        const nav = document.getElementById('main-nav');
        if (nav) { nav.style.opacity = '1'; nav.style.pointerEvents = 'auto'; }
      };

      /* ── Grain ── */
      (function () {
        const c = document.getElementById('grain-canvas');
        const ctx = c.getContext('2d');
        const rs = () => { c.width = innerWidth; c.height = innerHeight; };
        rs(); window.addEventListener('resize', rs);
        const draw = () => {
          const d = ctx.createImageData(c.width, c.height);
          for (let i = 0; i < d.data.length; i += 4) {
            const v = Math.random() * 255 | 0;
            d.data[i] = d.data[i + 1] = d.data[i + 2] = v;
            d.data[i + 3] = Math.random() * 15 | 0;
          }
          ctx.putImageData(d, 0, 0);
          requestAnimationFrame(draw);
        };
        draw();
      })();

      /* ── Rain ── */
      (function () {
        const c = document.getElementById('rain-canvas');
        const ctx = c.getContext('2d');
        let drops = [];
        const rs = () => {
          c.width = innerWidth; c.height = innerHeight;
          drops = Array.from({ length: 130 }, () => ({
            x: Math.random() * c.width, y: Math.random() * c.height,
            l: 10 + Math.random() * 25, v: 5 + Math.random() * 8,
            a: .04 + Math.random() * .12
          }));
        };
        rs(); window.addEventListener('resize', rs);
        const draw = () => {
          ctx.clearRect(0, 0, c.width, c.height);
          drops.forEach(d => {
            ctx.beginPath(); ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x - 1, d.y + d.l);
            ctx.strokeStyle = `rgba(200,220,240,${d.a})`; ctx.lineWidth = .7; ctx.stroke();
            d.y += d.v; if (d.y > c.height) { d.y = -d.l; d.x = Math.random() * c.width; }
          });
          requestAnimationFrame(draw);
        };
        draw();
      })();

      /* ── Clock synth ── */
      let clockIv = null;
      function playTick() {
        const ctx2 = ac()?.getContext();
        if (!ctx2) return;
        const now = ctx2.currentTime;
        const osc = ctx2.createOscillator();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + .04);
        const g = ctx2.createGain();
        g.gain.setValueAtTime(.025, now); g.gain.exponentialRampToValueAtTime(.001, now + .05);
        osc.connect(g); g.connect(ctx2.destination);
        osc.start(now); osc.stop(now + .06);
      }
      function startClock() {
        if (clockIv) return;
        const dot = document.getElementById('clock-dot');
        if (dot) dot.classList.add('ticking');
        clockIv = setInterval(() => { if (!window.__ch10Skip) playTick(); else stopClock(); }, 1000);
      }
      function stopClock() {
        if (clockIv) { clearInterval(clockIv); clockIv = null; }
        const dot = document.getElementById('clock-dot');
        if (dot) { dot.classList.remove('ticking'); dot.style.opacity = '0'; }
      }

      /* ── Memory bubbles ── */
      function showMemories() {
        const ml = document.getElementById('memory-layer');
        if (ml) ml.style.opacity = '1';
        document.querySelectorAll('.mem-text').forEach((el, i) => {
          setTimeout(() => { if (!window.__ch10Skip) el.style.opacity = '1'; }, i * 2000);
        });
      }
      function hideMemories() {
        document.querySelectorAll('.mem-text').forEach(el => { el.style.opacity = '0'; });
        setTimeout(() => {
          const ml = document.getElementById('memory-layer');
          if (ml) ml.style.opacity = '0';
        }, 2200);
      }

      /* ══ MAIN STORY TIMELINE ══ */
      async function runStory() {
        const scene = document.getElementById('scene');
        const rainC = document.getElementById('rain-canvas');
        const bs = document.getElementById('black-screen');
        const chLabel = document.getElementById('ch-label');
        const photo = document.getElementById('photo-wrap');
        const finalFade = document.getElementById('final-fade');
        const nav = document.getElementById('main-nav');
        const skipBtn = document.getElementById('skip-btn');
        const lampGlow = document.getElementById('lamp-glow');

        // ─ 1. Silence 3s ─
        await wait(3000);

        // ─ 2. Room fades in ─
        bs.style.opacity = '0';
        setTimeout(() => { bs.style.pointerEvents = 'none'; }, 2600);
        scene.style.opacity = '1';
        rainC.style.opacity = '0.5';
        chLabel.style.opacity = '1';
        if (skipBtn) skipBtn.classList.add('active');
        startClock();

        if (ac()) {
          ac().fadeTrack('rain', 0.07, 3000);
          ac().fadeTrack('breathing', 0.012, 3000);
        }

        await wait(3500);

        // ─ 3. Photo (blurred) fades in ─
        photo.style.opacity = '1';
        await wait(2500);

        // ─ OPENING ─
        await showCaption('"aku bertahan selama ini…\nkarena aku terlalu takut kehilangan kamu."', 'md', 6000);
        await hideCaption(); await wait(3000);

        await showCaption('"tapi sekarang aku mulai sadar…"', 'md', 4000);
        await hideCaption(); await wait(2000);

        await showCaption('"aku mungkin juga sedang membuat kamu lelah."', 'md', 5000);
        await hideCaption(); await wait(3500);

        // ─ TITLE ─
        photo.style.filter = 'grayscale(70%) brightness(.35) blur(6px) sepia(.3)';
        if (lampGlow) { lampGlow.style.opacity = '.5'; }

        await showCaption('I THINK I SHOULD GO', 'title', 4500);
        await wait(500);
        await showCaption('"jadi kali ini…\naku serahkan semuanya ke kamu."', 'sub', 4000);
        await hideCaption(); await wait(3000);

        // Piano enters softly
        if (ac()) { if (ac().playPiano) ac().playPiano(); ac().fadePiano(0.05, 3000); }

        // ─ EMOTIONAL MONOLOGUE ─
        await showCaption('"aku tahu aku terlalu overthinking."', 'md', 4000);
        await hideCaption(); await wait(1500);

        await showCaption('"aku terlalu sering takut kehilangan kamu."', 'md', 4500);
        await hideCaption(); await wait(1500);

        await showCaption('"aku terlalu sering minta diyakinkan."', 'md', 4000);
        await hideCaption(); await wait(1500);

        await showCaption('"aku terlalu sering panik karena perubahan kecil."', 'md', 4500);
        await hideCaption(); await wait(2500);

        await showCaption('"dan tanpa sadar…"', 'lg', 3000);
        await hideCaption(); await wait(1200);

        await showCaption('"aku bikin orang yang paling aku sayang\njadi ikut capek."', 'md', 6000);
        await hideCaption(); await wait(3000);

        // ─ DISSOLVING MEMORY ─
        showMemories();
        photo.style.filter = 'grayscale(90%) brightness(.25) blur(12px) sepia(.6)';

        await showCaption('"aku tidak pernah berniat membuatmu lelah."', 'sm', 4500);
        await hideCaption(); await wait(1500);

        await showCaption('"aku cuma terlalu takut kehilangan kamu."', 'sm', 4500);
        await hideCaption(); await wait(1500);

        await showCaption('"aku cuma terlalu takut ditinggalkan."', 'sm', 4000);
        await hideCaption(); await wait(1500);

        await showCaption('"aku cuma terlalu mencintaimu\ndengan cara yang salah."', 'sm', 5000);
        await hideCaption(); await wait(2500);

        hideMemories();

        // ─ MAIN EMOTIONAL SCENE ─
        if (ac()) { ac().fadePiano(0.09, 3000); ac().fadeTrack('rain', 0.12, 2500); }
        await wait(1500);

        await showCaption('"bukan karena aku berhenti sayang."', 'lg', 4500);
        await hideCaption(); await wait(2500);

        await showCaption('"aku masih sayang banget sama kamu."', 'lg', 4500);
        await hideCaption(); await wait(2000);

        await showCaption('"bahkan mungkin terlalu dalam."', 'md', 4000);
        await hideCaption(); await wait(2500);

        await showCaption('"tapi aku juga sadar…"', 'md', 3500);
        await hideCaption(); await wait(1500);

        await showCaption('"overthinkingku perlahan\nmemperburuk semuanya."', 'md', 5000);
        await hideCaption();

        // 3 detik sunyi
        await wait(3500);

        // ─ THE CHOICE ─
        if (lampGlow) { lampGlow.style.transition = 'opacity 6s ease'; lampGlow.style.opacity = '.05'; }
        photo.style.filter = 'grayscale(100%) brightness(.15) blur(15px) sepia(.9)';
        scene.style.transition = 'transform 25s ease';
        scene.style.transform = 'scale(1.05)';
        if (ac()) { ac().fadePiano(0.04, 4000); }

        await showCaption('"jadi kali ini…"', 'lg', 3500);
        await hideCaption(); await wait(2500);

        await showCaption('"aku tidak akan memutuskan sendiri."', 'md', 4500);
        await hideCaption(); await wait(2000);

        await showCaption('"karena selama ini aku selalu takut sendirian."', 'md', 4500);
        await hideCaption(); await wait(2000);

        await showCaption('"tapi sekarang aku lebih takut\nterus menyakitimu."', 'md', 5000);
        await hideCaption(); await wait(3500);

        await showCaption('"jadi aku serahkan semuanya ke kamu."', 'lg', 5000);
        await hideCaption(); await wait(4000);

        await showCaption('"kalau kamu izinkan aku mundur…"', 'md', 4500);
        await hideCaption(); await wait(2500);

        await showCaption('"aku akan mundur."', 'xl', 5000);
        await hideCaption(); await wait(3500);

        await showCaption('"tanpa marah."', 'sm', 3000);
        await hideCaption(); await wait(1200);

        await showCaption('"tanpa menyalahkan."', 'sm', 3000);
        await hideCaption(); await wait(1200);

        await showCaption('"tanpa meminta penjelasan."', 'sm', 3500);
        await hideCaption(); await wait(1200);

        await showCaption('"tanpa minta kamu merasa bersalah."', 'sm', 4000);
        await hideCaption(); await wait(3500);

        await showCaption('"meskipun jujur…"', 'md', 3000);
        await hideCaption(); await wait(1500);

        await showCaption('"aku belum siap."', 'lg', 4000);
        await hideCaption(); await wait(2500);

        await showCaption('"aku belum siap kehilangan kamu."', 'md', 5000);
        await hideCaption(); await wait(2000);

        await showCaption('"aku belum siap bangun pagi\ntanpa nama kamu di notifikasi."', 'md', 5500);
        await hideCaption(); await wait(2000);

        await showCaption('"aku belum siap belajar\ntidak cerita semuanya ke kamu."', 'md', 5500);
        await hideCaption(); await wait(3500);

        await showCaption('"tapi kalau itu yang kamu butuhkan…"', 'md', 4500);
        await hideCaption(); await wait(2500);

        await showCaption('"aku akan belajar."', 'lg', 4000);
        await hideCaption(); await wait(4000);

        await showCaption('"tapi kalau kamu masih mau aku di sini…"', 'md', 5000);
        await hideCaption(); await wait(3000);

        await showCaption('"aku masih di sini."', 'xl', 5000);
        await hideCaption(); await wait(3000);

        await showCaption('"aku tidak akan pergi kalau kamu tidak minta."', 'md', 5000);
        await hideCaption(); await wait(2000);

        await showCaption('"karena aku memang tidak pernah mau pergi."', 'md', 5000);
        await hideCaption(); await wait(2000);

        await showCaption('"yang aku mau dari dulu cuma satu…"', 'md', 4500);
        await hideCaption(); await wait(2000);

        await showCaption('"dipilih kamu."', 'xl', 5000);
        await hideCaption();

        // SUNYI TOTAL — hanya hujan
        await wait(5000);

        // ─ FINAL EMOTIONAL LINES ─
        if (ac()) { ac().fadePiano(0.02, 5000); ac().fadeTrack('rain', 0.18, 3000); }
        stopClock();

        await showCaption('"aku cuma ingin kamu yang memilih."', 'lg', 5000);
        await hideCaption(); await wait(3000);

        await showCaption('"karena apapun yang kamu pilih…"', 'md', 4000);
        await hideCaption(); await wait(1800);

        await showCaption('"aku akan menghormatinya."', 'md', 4500);
        await hideCaption(); await wait(2000);

        await showCaption('"meskipun hati aku hancur."', 'md', 4500);
        await hideCaption(); await wait(3500);

        await showCaption('"meskipun itu artinya aku harus belajar\nmelepaskan satu-satunya orang\nyang pernah bikin aku merasa cukup."', 'md', 7000);
        await hideCaption();

        if (ac()) {
          ac().fadePiano(0, 4000);
          ac().fadeTrack('breathing', 0, 3500);
        }

        // ─ ENDING ─
        await showCaption('"karena sejauh apa pun aku mencoba pergi…"', 'md', 5000);
        await hideCaption(); await wait(2000);

        await showCaption('"sebagian dari aku tetap ingin pulang ke kamu."', 'md', 6000);
        await hideCaption(); await wait(4000);

        // ─ FADE TO BLACK ─
        finalFade.style.opacity = '1';
        if (ac()) { ac().fadeTrack('rain', 0, 7000); }

        await wait(8000);

        // Skip button hidden, nav fades in
        if (skipBtn) skipBtn.classList.remove('active');
        nav.style.opacity = '1';
        nav.style.pointerEvents = 'auto';
      }

      /* ── Boot ── */
      function boot() {
        if (window.__ch10Started) return;
        window.__ch10Started = true;
        const p = document.getElementById('start-prompt');
        if (p) p.style.opacity = '0';
        runStory();
      }

      document.addEventListener('click', boot, { once: true });
      setTimeout(boot, 1500);
    })();
  </script>
</body>
