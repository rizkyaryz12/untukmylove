<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 9 — The Regret Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --amber: #c8854a;
      --amber-dim: rgba(200, 133, 74, 0.18);
      --dark: #080604;
      --table-brown: #1a0e06;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: var(--serif);
      color: rgba(240, 228, 210, 0.9);
      cursor: default;
    }

    /* ─── CANVAS (grain) ─── */
    #grain-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.04;
      mix-blend-mode: screen;
    }

    /* ─── RAIN STREAKS ─── */
    #rain-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 3s ease;
    }

    /* ─── SCENE WRAPPER ─── */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 0;
      opacity: 0;
      transition: opacity 2.5s ease;
    }

    /* ─── ROOM BACKGROUND ─── */
    #room-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 62%,
          rgba(200, 133, 74, 0.22) 0%,
          rgba(160, 90, 30, 0.08) 40%,
          transparent 70%),
        linear-gradient(180deg, #000 0%, #0a0603 40%, #110a04 65%, #1a0d05 100%);
    }

    /* ─── WINDOW RAIN EFFECT (top) ─── */
    #window-bg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 35%;
      background: linear-gradient(180deg, #0a0f14 0%, #060b10 100%);
      border-bottom: 1px solid rgba(100, 130, 160, 0.08);
      overflow: hidden;
    }

    #window-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
          transparent 0px,
          transparent 29px,
          rgba(60, 80, 100, 0.12) 30px);
    }

    #window-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg,
          transparent 0px,
          transparent 49px,
          rgba(60, 80, 100, 0.1) 50px);
    }

    .window-frame {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(40, 30, 20, 0.8);
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
    }

    /* ─── WALL ─── */
    #wall {
      position: absolute;
      top: 35%;
      bottom: 28%;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, #110a04 0%, #1a0d05 100%);
    }

    /* ─── DESK ─── */
    #desk {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28%;
      background: linear-gradient(180deg, #1a0d05 0%, #120900 100%);
      border-top: 2px solid #2e1a09;
      box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.8);
    }

    /* desk surface top highlight */
    #desk::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(200, 133, 74, 0.3), transparent);
    }

    /* ─── LAMP ─── */
    #lamp {
      position: absolute;
      bottom: 27%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lamp-shade {
      width: 80px;
      height: 50px;
      background: linear-gradient(180deg, #8a6030 0%, #b07838 50%, #705020 100%);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
      box-shadow: 0 0 0 1px rgba(200, 133, 74, 0.3);
    }

    .lamp-body {
      width: 8px;
      height: 60px;
      background: linear-gradient(180deg, #806040 0%, #504030 100%);
    }

    .lamp-base {
      width: 50px;
      height: 8px;
      background: linear-gradient(180deg, #604830 0%, #402010 100%);
      border-radius: 2px;
    }

    /* ─── LAMP GLOW ─── */
    #lamp-glow {
      position: absolute;
      bottom: 26%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse at 50% 0%,
          rgba(255, 180, 60, 0.18) 0%,
          rgba(200, 120, 40, 0.08) 40%,
          transparent 70%);
      pointer-events: none;
      animation: lampFlicker 7s ease-in-out infinite;
    }

    @keyframes lampFlicker {

      0%,
      100% {
        opacity: 1;
      }

      45% {
        opacity: 0.9;
      }

      46% {
        opacity: 0.6;
      }

      47% {
        opacity: 0.85;
      }

      80% {
        opacity: 0.95;
      }

      81% {
        opacity: 0.75;
      }

      82% {
        opacity: 0.95;
      }
    }

    /* ─── PHOTO POLAROID ─── */
    #photo-wrap {
      position: absolute;
      bottom: 29%;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 210px;
      background: #f5f0e8;
      padding: 10px 10px 36px 10px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 0, 0, 0.4),
        0 0 60px rgba(200, 120, 40, 0.15),
        inset 0 0 8px rgba(0, 0, 0, 0.06);
      transition: filter 8s ease, opacity 6s ease;
    }

    #photo-wrap img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      filter: brightness(0.85) contrast(1.1) saturate(0.75) sepia(0.18);
    }

    /* ─── SHADOW CHAIR (suggestion only) ─── */
    #chair-shadow {
      position: absolute;
      bottom: 27%;
      right: 18%;
      width: 80px;
      height: 120px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
      clip-path: polygon(30% 0%, 70% 0%, 90% 100%, 10% 100%);
      opacity: 0.4;
    }

    /* ─── DUST PARTICLES ─── */
    .dust {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 200, 100, 0.5);
      pointer-events: none;
      animation: dustFloat linear infinite;
    }

    @keyframes dustFloat {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 0.5;
      }

      100% {
        transform: translateY(-120px) translateX(30px);
        opacity: 0;
      }
    }

    /* ─── OPENING BLACK SCREEN ─── */
    #black-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      transition: opacity 2.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #start-prompt {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(0.75rem, 1.5vw, 0.95rem);
      color: rgba(200, 160, 100, 0.5);
      letter-spacing: 0.3em;
      animation: promptPulse 2.5s ease-in-out infinite;
      text-transform: lowercase;
    }

    @keyframes promptPulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.85;
      }
    }

    /* ─── TEXT OVERLAY ─── */
    #text-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .caption {
      position: absolute;
      width: 100%;
      text-align: center;
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      color: #f0e8d8;
      line-height: 1.9;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 2s ease;
      padding: 0 15%;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.95), 0 0 60px rgba(0, 0, 0, 0.8);
    }

    /* Captions positioned in upper 2/3 of screen — clear of desk/photo */
    .caption.sm {
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      top: 18%;
    }

    .caption.md {
      font-size: clamp(1.1rem, 2.2vw, 1.45rem);
      top: 22%;
    }

    .caption.lg {
      font-size: clamp(1.6rem, 3.8vw, 2.4rem);
      top: 16%;
    }

    .caption.xl {
      font-size: clamp(2.2rem, 5.5vw, 3.6rem);
      top: 12%;
      font-weight: 400;
      font-style: normal;
      letter-spacing: 0.15em;
    }

    /* ─── CHAPTER LABEL ─── */
    #ch-label {
      position: fixed;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--sans);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: rgba(200, 133, 74, 0.5);
      opacity: 0;
      z-index: 50;
      transition: opacity 2s ease;
    }

    /* ─── FLOATING REGRET TEXTS ─── */
    #float-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      overflow: hidden;
    }

    .float-word {
      position: absolute;
      font-family: var(--serif);
      font-style: italic;
      color: rgba(220, 195, 155, 0.28);
      filter: blur(0.6px);
      white-space: nowrap;
      animation: floatRise linear infinite;
      opacity: 0;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
    }

    @keyframes floatRise {
      0% {
        transform: translateY(40px);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      85% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-60px);
        opacity: 0;
      }
    }

    /* ─── VIGNETTE ─── */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
          transparent 30%,
          rgba(0, 0, 0, 0.5) 70%,
          rgba(0, 0, 0, 0.85) 100%);
    }

    /* ─── FINAL FADE ─── */
    #final-fade {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 5s ease;
    }

    /* ─── NAV (only visible after story) ─── */
    .cinematic-nav {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 250;
      opacity: 0;
      display: flex;
      gap: 16px;
      align-items: center;
      transition: opacity 2s ease;
      pointer-events: none;
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: rgba(200, 133, 74, 0.5);
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 8px;
    }

    .nav-btn:hover {
      color: rgba(200, 133, 74, 0.9);
    }

    .nav-divider {
      width: 40px;
      height: 1px;
      background: rgba(200, 133, 74, 0.2);
    }

    /* ─── SKIP BUTTON ─── */
    #skip-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 300;
      background: transparent;
      border: 1px solid rgba(200, 133, 74, 0.15);
      color: rgba(200, 133, 74, 0.4);
      font-family: var(--sans);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s, border-color 0.3s, color 0.3s;
      text-transform: uppercase;
    }

    #skip-btn.active {
      opacity: 0.6;
      pointer-events: auto;
    }

    #skip-btn.active:hover {
      opacity: 1;
      border-color: rgba(200, 133, 74, 0.6);
      color: rgba(200, 133, 74, 0.9);
    }
  </style>
</head>

<body>

  <!-- Fade Cover -->
  <div class="transition-overlay"></div>

  <!-- Grain & Rain canvases -->
  <canvas id="grain-canvas"></canvas>
  <canvas id="rain-canvas"></canvas>

  <!-- Opening black screen -->
  <div id="black-screen">
    <div id="start-prompt">klik di mana saja untuk memulai</div>
  </div>

  <!-- Scene -->
  <div id="scene">
    <div id="room-bg"></div>
    <div id="window-bg">
      <div class="window-frame"></div>
    </div>
    <div id="wall"></div>
    <div id="desk"></div>
    <div id="lamp-glow"></div>
    <div id="lamp">
      <div class="lamp-shade"></div>
      <div class="lamp-body"></div>
      <div class="lamp-base"></div>
    </div>
    <div id="chair-shadow"></div>
    <div id="photo-wrap">
      <img src="images/Foto14.jpeg" alt="Foto Dia">
    </div>
  </div>

  <!-- Overlays -->
  <div id="vignette"></div>
  <div id="float-layer"></div>
  <div id="text-layer"></div>
  <div id="ch-label">CHAPTER 09</div>

  <!-- Final fade -->
  <div id="final-fade"></div>

  <!-- Nav (appears after ending) -->
  <nav class="cinematic-nav" id="main-nav">
    <a href="chapter8.html" class="nav-btn">← prev</a>
    <div class="nav-divider"></div>
    <a href="chapter10.html" class="nav-btn">next →</a>
  </nav>

  <!-- Skip monologue button -->
  <button id="skip-btn" onclick="skipTimeline()">skip monologue</button>

  <script src="js/script.js"></script>
  <script>
    (() => {
      // ── Utilities ──────────────────────────────────────────────
      const wait = ms => new Promise(r => setTimeout(r, ms));
      const layer = document.getElementById('text-layer');
      const ac = () => window.audioController;

      let activeCaption = null;
      window.__skipActive = false;

      function showCaption(text, cls, duration) {
        return new Promise(async r => {
          if (window.__skipActive) { r(); return; }
          if (activeCaption) {
            activeCaption.style.opacity = '0';
            await wait(800);
            if (activeCaption) activeCaption.remove();
            activeCaption = null;
          }
          if (window.__skipActive) { r(); return; }
          const el = document.createElement('div');
          el.className = `caption ${cls}`;
          el.textContent = text;
          layer.appendChild(el);
          activeCaption = el;
          await wait(50);
          if (window.__skipActive) { r(); return; }
          el.style.opacity = '1';
          await wait(duration || 3500);
          r();
        });
      }

      async function hideCaption() {
        if (!activeCaption || window.__skipActive) return;
        activeCaption.style.opacity = '0';
        await wait(1500);
        if (activeCaption) activeCaption.remove();
        activeCaption = null;
      }

      window.skipTimeline = () => {
        window.__skipActive = true;

        const scene = document.getElementById('scene');
        const rainC = document.getElementById('rain-canvas');
        const blackScreen = document.getElementById('black-screen');
        const chLabel = document.getElementById('ch-label');
        const photo = document.getElementById('photo-wrap');
        const finalFade = document.getElementById('final-fade');
        const nav = document.getElementById('main-nav');
        const skipBtn = document.getElementById('skip-btn');

        if (skipBtn) skipBtn.classList.remove('active');
        if (activeCaption) {
          activeCaption.remove();
          activeCaption = null;
        }

        if (blackScreen) {
          blackScreen.style.opacity = '0';
          blackScreen.style.pointerEvents = 'none';
        }

        if (scene) scene.style.opacity = '1';

        const lampShade = document.querySelector('.lamp-shade');
        if (lampShade) { lampShade.style.transition = 'none'; lampShade.style.opacity = '0'; }
        const lampBody = document.querySelector('.lamp-body');
        if (lampBody) { lampBody.style.transition = 'none'; lampBody.style.opacity = '0.2'; }
        const lampGlow = document.getElementById('lamp-glow');
        if (lampGlow) { lampGlow.style.transition = 'none'; lampGlow.style.opacity = '0'; }
        if (photo) { photo.style.transition = 'none'; photo.style.opacity = '0'; }

        if (finalFade) {
          finalFade.style.transition = 'opacity 1s ease';
          finalFade.style.opacity = '1';
        }

        if (ac()) {
          ac().fadeTrack('heartbeat', 0, 1000);
          ac().fadePiano(0, 1000);
          ac().fadeTrack('static', 0, 1000);
          ac().fadeTrack('breathing', 0, 1000);
          ac().fadeTrack('rain', 0, 2000);
        }

        if (nav) {
          nav.style.opacity = '1';
          nav.style.pointerEvents = 'auto';
        }
      };

      // ── Grain Canvas ───────────────────────────────────────────
      (function grain() {
        const c = document.getElementById('grain-canvas');
        const ctx = c.getContext('2d');
        function resize() { c.width = innerWidth; c.height = innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        function draw() {
          const img = ctx.createImageData(c.width, c.height);
          for (let i = 0; i < img.data.length; i += 4) {
            const v = Math.random() * 255 | 0;
            img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
            img.data[i + 3] = Math.random() * 18 | 0;
          }
          ctx.putImageData(img, 0, 0);
          requestAnimationFrame(draw);
        }
        draw();
      })();

      // ── Rain Canvas ────────────────────────────────────────────
      (function rain() {
        const c = document.getElementById('rain-canvas');
        const ctx = c.getContext('2d');
        let drops = [];
        function resize() {
          c.width = innerWidth; c.height = innerHeight;
          drops = Array.from({ length: 120 }, () => ({
            x: Math.random() * c.width,
            y: Math.random() * c.height,
            len: 8 + Math.random() * 14,
            speed: 6 + Math.random() * 8,
            alpha: 0.03 + Math.random() * 0.08
          }));
        }
        resize();
        window.addEventListener('resize', resize);
        function draw() {
          ctx.clearRect(0, 0, c.width, c.height);
          ctx.strokeStyle = 'rgba(150,170,200,1)';
          drops.forEach(d => {
            ctx.globalAlpha = d.alpha;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x - 1, d.y + d.len);
            ctx.stroke();
            d.y += d.speed;
            if (d.y > c.height) { d.y = -d.len; d.x = Math.random() * c.width; }
          });
          ctx.globalAlpha = 1;
          requestAnimationFrame(draw);
        }
        draw();
      })();

      // ── Dust Particles ─────────────────────────────────────────
      (function dust() {
        const scene = document.getElementById('scene');
        for (let i = 0; i < 18; i++) {
          const d = document.createElement('div');
          d.className = 'dust';
          const size = 1 + Math.random() * 2;
          d.style.cssText = `
          width:${size}px; height:${size}px;
          left:${30 + Math.random() * 40}%;
          bottom:${25 + Math.random() * 25}%;
          animation-duration:${6 + Math.random() * 10}s;
          animation-delay:${Math.random() * -12}s;
          opacity:${0.3 + Math.random() * 0.5};
        `;
          scene.appendChild(d);
        }
      })();

      // ── Floating Regret Texts ──────────────────────────────────
      function spawnFloatTexts() {
        const words = [
          "harusnya aku lebih percaya.",
          "harusnya aku lebih tenang.",
          "aku terlalu kekanak-kanakan.",
          "aku terlalu sering panik.",
          "aku terlalu takut kehilangan.",
          "aku terlalu sering butuh diyakinkan.",
          "aku bikin kamu lelah ya?",
          "kenapa aku tidak bisa diam?",
          "aku seharusnya lebih sabar.",
          "maafkan aku.",
        ];
        const fl = document.getElementById('float-layer');
        words.forEach((w, i) => {
          const el = document.createElement('div');
          el.className = 'float-word';
          el.textContent = w;
          el.style.cssText = `
          left:${5 + Math.random() * 75}%;
          bottom:${20 + Math.random() * 50}%;
          font-size:${0.7 + Math.random() * 0.5}rem;
          animation-duration:${14 + Math.random() * 10}s;
          animation-delay:${i * 2.5}s;
        `;
          fl.appendChild(el);
        });
      }

      // ── Main Story Timeline ────────────────────────────────────
      async function runStory() {
        const scene = document.getElementById('scene');
        const rainC = document.getElementById('rain-canvas');
        const blackScreen = document.getElementById('black-screen');
        const chLabel = document.getElementById('ch-label');
        const photo = document.getElementById('photo-wrap');
        const finalFade = document.getElementById('final-fade');
        const nav = document.getElementById('main-nav');

        // ─ 1. Silence 2 s ─
        await wait(2000);

        // ─ 2. Fade in room with rain + ambience ─
        blackScreen.style.opacity = '0';
        blackScreen.style.pointerEvents = 'none';
        scene.style.opacity = '1';
        rainC.style.opacity = '0.45';
        chLabel.style.opacity = '1';

        // Show skip button
        const skipBtn = document.getElementById('skip-btn');
        if (skipBtn) skipBtn.classList.add('active');

        if (ac()) {
          ac().fadeTrack('rain', 0.05, 2000);
          ac().fadeTrack('static', 0.004, 2000);
          ac().fadeTrack('breathing', 0.015, 2000);
          if (ac().playPiano) ac().playPiano();
          ac().fadePiano(0.08, 2000);
          ac().play('heartbeat');
          ac().fadeTrack('heartbeat', 0.025, 2000);
        }

        await wait(3000);

        // ─ 3. Opening quote ─
        await showCaption(
          '"aku berharap aku bisa mencintaimu tanpa rasa takut sebesar ini."',
          'md', 5000
        );
        await hideCaption();
        await wait(1500);

        // ─ 4. Title ─
        await showCaption('THE REGRET ROOM', 'xl', 3500);
        await wait(600);
        await showCaption('tempat semua penyesalan akhirnya tinggal.', 'sm', 3000);
        await hideCaption();
        await wait(1200);

        // ─ 5. Spawn floating regret texts ─
        spawnFloatTexts();

        // ─ 6. Monologue — long emotional letter ─
        const lines = [
          { text: '"mungkin kalau aku lebih tenang…"', cls: 'md', dur: 3500 },
          { text: '"kita tidak akan sejauh ini."', cls: 'md', dur: 4000 },
          { text: '"mungkin kalau aku tidak terlalu overthinking…"', cls: 'md', dur: 3500 },
          { text: '"kamu tidak akan selelah ini."', cls: 'md', dur: 4000 },
          { text: '"mungkin kalau aku tidak terlalu takut kehilangan…"', cls: 'md', dur: 3500 },
          { text: '"aku tidak akan terus meminta diyakinkan."', cls: 'md', dur: 4000 },
          { text: '"aku sadar sekarang…"', cls: 'md', dur: 3000 },
          { text: '"aku terlalu mencintaimu dengan rasa takut yang salah."', cls: 'md', dur: 5000 },
        ];

        for (const { text, cls, dur } of lines) {
          await hideCaption();
          await wait(600);
          await showCaption(text, cls, dur);
        }
        await hideCaption();
        await wait(2000);

        // ─ 7. Main emotional scene: camera zoom on photo ─
        scene.style.transition = 'transform 8s ease';
        scene.style.transform = 'scale(1.04)';
        if (ac()) {
          ac().fadeTrack('rain', 0.10, 3000);
          ac().fadeTrack('heartbeat', 0.04, 3000);
        }

        await showCaption('"aku baru sadar…"', 'md', 3000);
        await hideCaption();
        await wait(800);
        await showCaption('"orang yang paling capek menghadapi overthinking aku…"', 'md', 4000);
        await hideCaption();
        await wait(2800);      // painful silence
        await showCaption('"adalah kamu."', 'lg', 5000);
        await hideCaption();
        await wait(3000);      // silence after that

        await showCaption(
          '"dan aku minta maaf karena membuat orang yang aku sayang…\nharus ikut tenggelam di isi kepala aku."',
          'md', 6000
        );
        await hideCaption();
        await wait(2000);

        // ─ 8. Climax: photo blurs, music dims ─
        photo.style.filter = 'blur(4px) brightness(0.5) sepia(0.3)';
        scene.style.transform = 'scale(1.08)';
        if (ac()) {
          ac().fadePiano(0.03, 3000);
          ac().fadeTrack('rain', 0.18, 2000);
        }

        await showCaption('"aku mencintaimu…"', 'xl', 4000);
        await hideCaption();
        await wait(2500);
        await showCaption(
          '"tapi aku tidak tahu cara mencintai tanpa rasa takut."',
          'lg', 6000
        );
        await hideCaption();
        await wait(3000);

        // ─ 9. Ending: lamp off, rain sustains, fade out ─
        document.querySelector('.lamp-shade').style.transition = 'opacity 3s';
        document.querySelector('.lamp-shade').style.opacity = '0';
        document.querySelector('.lamp-body').style.transition = 'opacity 3s';
        document.querySelector('.lamp-body').style.opacity = '0.2';
        document.getElementById('lamp-glow').style.transition = 'opacity 4s';
        document.getElementById('lamp-glow').style.opacity = '0';
        photo.style.opacity = '0';

        if (ac()) {
          ac().fadeTrack('heartbeat', 0, 3000);
          ac().fadePiano(0, 3000);
          ac().fadeTrack('static', 0, 2000);
          ac().fadeTrack('breathing', 0, 2000);
          ac().fadeTrack('rain', 0.22, 3000); // only rain remains
        }

        await wait(3000);
        await showCaption('"dan apakah mungkin…\nsemuanya sudah terlambat."', 'md', 6000);
        await hideCaption();
        await wait(2000);

        // ─ 10. Fade to black ─
        finalFade.style.opacity = '1';
        if (ac()) ac().fadeTrack('rain', 0, 5000);

        await wait(5500);

        // Hide skip button, show nav
        const skipBtnEnd = document.getElementById('skip-btn');
        if (skipBtnEnd) skipBtnEnd.classList.remove('active');

        nav.style.opacity = '1';
        nav.style.pointerEvents = 'auto';
        nav.style.transition = 'opacity 2s ease';
      }

      // ── Boot: start on click OR auto after 1.5s ──────────────────
      function boot() {
        if (window.__ch9Started) return;
        window.__ch9Started = true;
        // Hide the start prompt immediately
        const prompt = document.getElementById('start-prompt');
        if (prompt) prompt.style.opacity = '0';
        runStory();
      }

      document.addEventListener('click', boot, { once: true });

      // Auto-start after 1.5s (audio might not unlock but visuals will run)
      setTimeout(boot, 1500);
    })();
  </script>
</body>

</html>
