<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 5 - Inside My Head</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Premium visual styling for Chapter 5 inside my head chaos */
    body.ch5-page {
      background: #020306;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      color: var(--text-primary);
    }

    .room-bg-distort {
      position: fixed;
      inset: 0;
      background: url('images/ch5.jpg') center/cover no-repeat;
      filter: grayscale(40%) blur(25px) brightness(0.08) sepia(10%);
      transform: scale(1.15);
      z-index: 1;
      transition: all 4s ease;
    }

    .room-bg-distort.active {
      filter: grayscale(50%) blur(8px) brightness(0.15) sepia(5%);
      transform: scale(1.03);
    }

    .ch5-stage-center {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 24px;
      text-align: center;
    }

    .ch5-sub {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(1.2rem, 3.5vw, 2.2rem);
      color: var(--text-soft);
      opacity: 0;
      filter: blur(8px);
      transform: translateY(15px);
      transition: all 1.8s ease;
      margin-bottom: 24px;
    }

    .ch5-sub.reveal {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }

    /* Scrambled dynamic chaos thoughts */
    .chaos-thought-item {
      position: absolute;
      font-family: var(--font-serif);
      font-style: italic;
      color: rgba(255, 255, 255, 0.08);
      font-size: clamp(0.95rem, 2vw, 1.45rem);
      opacity: 0;
      filter: blur(3px);
      transition: all 1.5s ease;
      white-space: nowrap;
      pointer-events: none;
      z-index: 12;
    }

    .chaos-thought-item.reveal {
      opacity: 0.32;
      filter: blur(0);
    }

    .chaos-thought-item.glitch-flash {
      color: #93c5fd;
      opacity: 0.85 !important;
      text-shadow: 0 0 10px rgba(147, 197, 253, 0.6);
      transform: scale(1.06);
    }

    /* Stacking Notification Center */
    .notif-breakdown-stack {
      position: absolute;
      right: 5%;
      top: 10%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
      z-index: 15;
    }

    .breakdown-card {
      background: rgba(10, 11, 14, 0.85);
      border: 1px solid rgba(147, 197, 253, 0.15);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .breakdown-card.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* iMessage Chat Frame */
    .chaos-chat {
      width: 100%;
      max-width: 420px;
      margin-top: 40px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.2s ease;
    }

    .chaos-chat.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Screen shake / glitch styles */
    body.glitch-vibrate {
      animation: heavyVibrate 0.12s infinite;
    }

    @keyframes heavyVibrate {
      0%, 100% { transform: translate(0, 0) scale(1); }
      20% { transform: translate(-4px, 3px) scale(1.002); }
      40% { transform: translate(4px, -3px) scale(0.998); }
      60% { transform: translate(-3px, -4px) scale(1.001); }
      80% { transform: translate(3px, 4px) scale(0.999); }
    }

    /* Silence Freeze Canvas Overlay */
    .absolute-silence-stage {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 3000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .absolute-silence-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .absolute-silence-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(1.4rem, 5vw, 2.8rem);
      color: var(--accent-sunset);
      text-shadow: 0 0 15px rgba(200, 149, 108, 0.35);
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 2s ease, transform 2s ease;
      text-align: center;
      max-width: 780px;
    }

    .absolute-silence-quote.reveal {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body class="blue-aesthetic ch5-page">

  <!-- Fade Cover -->
  <div class="transition-overlay"></div>

  <!-- Ambient elements -->
  <canvas id="grain-canvas"></canvas>
  <div class="vhs-lines"></div>
  <div class="rain-container" style="opacity: 0.85;"></div>

  <!-- Heartbeat overlay -->
  <div class="heartbeat-overlay" id="ch5-heartbeat"></div>

  <div class="room-bg-distort" id="bg-layer"></div>

  <!-- Main interactive content stage -->
  <main class="ch5-stage-center">
    
    <!-- SUBTITLE OPENING SCENE -->
    <div class="opening-subs" id="opening-subs">
      <p class="ch5-sub" id="sub1">“aku mulai kehilangan cara buat nenangin isi kepala aku sendiri.”</p>
      <p class="ch5-sub" id="sub2">“dan setiap hal kecil mulai terasa menakutkan.”</p>
    </div>

    <!-- DIARY MONOLOGUE STAGE -->
    <div id="monologue-box" style="max-width: 680px; text-align: left; display: none;"></div>

  </main>

  <!-- OVERWHELMING SPANS CONTAINER -->
  <div id="thought-chaos-layer"></div>

  <!-- STACKING NOTIFICATION BREAKDOWN -->
  <div class="notif-breakdown-stack" id="notif-chaos-stack"></div>

  <!-- ABSOLUTE SILENCE FREEZE BANNER -->
  <div class="absolute-silence-stage" id="silence-overlay">
    <div class="absolute-silence-quote" id="silence-quote">
      “ovtku malah memperburuk semuanya.”
    </div>
  </div>

  <script src="js/script.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bg = document.getElementById('bg-layer');
      const sub1 = document.getElementById('sub1');
      const sub2 = document.getElementById('sub2');
      const heartbeat = document.getElementById('ch5-heartbeat');

      // Timeline Chapter 5: Inside My Head

      // 1. Reveal opening subtitles
      setTimeout(() => sub1.classList.add('reveal'), 1500);
      setTimeout(() => sub2.classList.add('reveal'), 4500);

      // 2. Transition opening to Diary Monologue
      setTimeout(() => {
        sub1.classList.remove('reveal');
        sub2.classList.remove('reveal');
        
        setTimeout(() => {
          bg.classList.add('active');
          heartbeat.classList.add('active');
          // Start synthesized heartbeat at 0.35 volume
          if (window.audioController) {
            window.audioController.startHeartbeat(0.35);
          }
          startDiaryMonologue();
        }, 1200);
      }, 8500);
    });

    // Simulated Long Diary Monologues
    function startDiaryMonologue() {
      const mBox = document.getElementById('monologue-box');
      mBox.style.display = 'block';

      const phrases = [
        "kadang waktu kamu online tapi tidak balas chat aku…",
        "isi kepala aku langsung ramai sendiri.",
        "aku mulai mikir yang tidak-tidak.",
        "aku mulai takut kamu bosan.",
        "aku mulai takut kamu nyaman sama orang lain.",
        "aku mulai takut aku tidak cukup buat dipertahankan.",
        "dan semakin aku takut kehilangan kamu… semakin aku berubah jadi orang yang melelahkan."
      ];

      phrases.forEach((txt, index) => {
        setTimeout(() => {
          const el = document.createElement('p');
          el.className = 'ch5-sub';
          el.style.fontSize = '1.35rem';
          el.style.marginBottom = '20px';
          el.textContent = txt;
          if (index === phrases.length - 1) {
            el.style.color = 'var(--accent-sunset)';
          }
          mBox.appendChild(el);
          setTimeout(() => el.classList.add('reveal'), 100);
        }, index * 2400);
      });

      // After monologue completes, transition directly to overwhelming thoughts chaos
      setTimeout(() => {
        mBox.style.opacity = '0';
        mBox.style.transition = 'opacity 1.5s ease';
        
        setTimeout(() => {
          mBox.style.display = 'none';
          startOverwhelmingChaos();
        }, 1500);

      }, phrases.length * 2400 + 2000);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // Chaos breakdown screen timings
    function startOverwhelmingChaos() {
      const spawner = document.getElementById('thought-chaos-layer');
      const notifStack = document.getElementById('notif-chaos-stack');
      
      // Start low drone, tinnitus, and increase heartbeat & breathing volumes for high tension
      if (window.audioController) {
        window.audioController.startDrone(0.3);
        window.audioController.startTinnitus(0.02);
        window.audioController.fadeTrack('heartbeat', 0.6, 2000);
        window.audioController.fadeTrack('breathing', 0.08, 2000);
      }

      const thoughts = [
        "kalau dia bosan?", "kalau dia berubah?", "kenapa sekarang dia cuek?", "aku takut diduakan.",
        "aku takut kamu chatting sama cowok lain.", "aku takut kamu nyaman sama orang lain.", "aku takut diganti.",
        "aku takut jadi cuma sementara.", "aku takut kamu capek sama aku.", "aku takut kalah sama orang lain.",
        "aku takut kehilangan rumah paling nyaman aku.", "aku takut suatu hari nanti kamu pergi diam-diam.",
        "aku cuma pengen diyakinkan.", "aku cuma pengen dipilih.", "aku cuma pengen merasa cukup.",
        "apa aku terlalu berlebihan?", "apa aku terlalu melelahkan?", "apa aku bikin kamu risih?", "apa kamu mulai menjauh?"
      ];

      const stackNotifs = [
        "Online",
        "Typing...",
        "Pesan telah dihapus",
        "Panggilan tak terjawab",
        "Kamar mulai sepi"
      ];

      const largeTitles = [
        "aku takut dibohongi", "aku takut ditinggalkan", "aku takut kalah sama orang lain",
        "aku takut sendirian lagi", "aku takut tidak cukup", "aku takut kamu berubah",
        "aku takut kamu pergi", "aku takut kehilangan kamu"
      ];

      // Spawn floating thoughts rapidly
      thoughts.forEach((t, i) => {
        setTimeout(() => {
          const card = document.createElement('div');
          card.classList.add('chaos-thought-item');
          card.textContent = t;
          card.style.top = (Math.random() * 80 + 10) + '%';
          card.style.left = (Math.random() * 70 + 10) + '%';
          spawner.appendChild(card);
          
          setTimeout(() => card.classList.add('reveal'), 50);

          // Play subtle text pop sound
          if (window.audioController) {
            window.audioController.playCassetteNoise();
          }

          // Continuous floating vibration
          setInterval(() => {
            card.style.transform = `translate(${(Math.random() - 0.5) * 10}px, ${(Math.random() - 0.5) * 8}px)`;
          }, 100);
        }, i * 250);
      });

      // Spawn stacking notification cards
      stackNotifs.forEach((nText, i) => {
        setTimeout(() => {
          const card = document.createElement('div');
          card.classList.add('breakdown-card');
          card.innerHTML = `
            <div class="notification-avatar"></div>
            <div class="notification-text">
              <div class="notification-title">Kamu</div>
              <div class="notification-body">${nText}</div>
            </div>
          `;
          notifStack.appendChild(card);
          setTimeout(() => card.classList.add('show'), 50);

          // Play notification chime
          if (window.audioController) {
            window.audioController.playChatNotif();
          }
        }, i * 1100 + 800);
      });

      // Spawn large overlay breakdown words
      largeTitles.forEach((t, i) => {
        setTimeout(() => {
          const card = document.createElement('div');
          card.classList.add('chaos-thought-item', 'glitch-flash');
          card.textContent = t;
          card.style.top = (30 + (i * 7)) + '%';
          card.style.left = (20 + (Math.random() * 15)) + '%';
          card.style.fontSize = '2rem';
          spawner.appendChild(card);
          
          setTimeout(() => card.classList.add('reveal'), 50);
          
          // Trigger whoosh sound
          if (window.audioController) {
            window.audioController.playWhoosh();
          }

          // Trigger screen shake
          document.body.classList.add('glitch-vibrate');
          setTimeout(() => document.body.classList.remove('glitch-vibrate'), 150);

        }, i * 750 + 3500);
      });

      // TOTAL FREEZE SILENCE TRIGGER
      setTimeout(() => {
        spawner.innerHTML = "";
        notifStack.innerHTML = "";

        // Fade out all intense tension tracks and piano. Leave only very soft rain and breathing.
        if (window.audioController) {
          window.audioController.fadePiano(0, 1500);
          window.audioController.fadeTrack('drone', 0, 1500);
          window.audioController.fadeTrack('heartbeat', 0, 1500);
          window.audioController.fadeTrack('tinnitus', 0, 1000);
          window.audioController.fadeTrack('static', 0.005, 1500);
          window.audioController.fadeTrack('rain', 0.04, 1500);
          window.audioController.fadeTrack('breathing', 0.01, 1500);
        }

        const silenceOverlay = document.getElementById('silence-overlay');
        const silenceQuote = document.getElementById('silence-quote');

        silenceOverlay.classList.add('active');
        
        setTimeout(() => {
          silenceQuote.classList.add('reveal');
        }, 1000);

        // Transition to Self Awareness Section
        setTimeout(() => {
          silenceQuote.classList.remove('reveal');
          setTimeout(() => {
            silenceOverlay.classList.remove('active');

            // Fade ambient tracks back in softly
            if (window.audioController) {
              window.audioController.fadePiano(0.12, 2000);
              window.audioController.fadeTrack('rain', 0.08, 2000);
              window.audioController.fadeTrack('static', 0.015, 2000);
              window.audioController.fadeTrack('breathing', 0.02, 2000);
            }

            triggerSelfAwarenessScene();
          }, 1500);
        }, 5500);

      }, 12000);
    }

    // Painful Self Awareness monologue flow
    function triggerSelfAwarenessScene() {
      const bg = document.getElementById('bg-layer');
      bg.classList.remove('active'); // Dark again

      const scene = document.querySelector('.ch5-stage-center');
      scene.innerHTML = `
        <div style="max-width: 640px; text-align: left;" id="aware-box"></div>
      `;

      const awareBox = document.getElementById('aware-box');
      const lines = [
        "aku sadar aku terlalu kekanak-kanakan.",
        "aku terlalu sering butuh diyakinkan.",
        "aku terlalu sering takut kehilangan.",
        "dan tanpa sadar…",
        "aku bikin orang yang paling aku sayang jadi capek menghadapi aku."
      ];

      lines.forEach((txt, index) => {
        setTimeout(() => {
          const el = document.createElement('p');
          el.className = 'ch5-sub';
          el.style.fontSize = '1.35rem';
          el.style.marginBottom = '20px';
          el.textContent = txt;
          if (index === lines.length - 1) {
            el.style.color = 'var(--accent-sunset)';
          }
          awareBox.appendChild(el);
          setTimeout(() => el.classList.add('reveal'), 100);
        }, index * 2400);
      });

      // Transition to final offline scene
      setTimeout(() => {
        awareBox.style.opacity = '0';
        awareBox.style.transition = 'opacity 1.5s ease';
        
        setTimeout(() => {
          awareBox.style.display = 'none';
          triggerCh5FinalEnding();
        }, 1500);

      }, lines.length * 2400 + 2000);
    }

    // Final Offline & monologue scene
    function triggerCh5FinalEnding() {
      const scene = document.querySelector('.ch5-stage-center');
      scene.innerHTML = `
        <div class="notif-breakdown-stack" style="position:static; margin-bottom: 40px;">
          <div class="breakdown-card show" style="margin: 0 auto;">
            <div class="notification-avatar" style="background:#4b5563;"></div>
            <div class="notification-text">
              <div class="notification-title">Kamu</div>
              <div class="notification-body">offline</div>
            </div>
          </div>
        </div>
        <p class="ch5-sub" id="final-line1" style="font-size:1.5rem;">“mungkin aku terlalu mencintaimu dengan rasa takut yang salah.”</p>
      `;

      setTimeout(() => {
        document.getElementById('final-line1').classList.add('reveal');
      }, 1000);

      // Auto redirect to Chapter 6
      setTimeout(() => {
        const overlay = document.querySelector('.transition-overlay');
        if (overlay) {
          overlay.classList.remove('fade-out');
        }

        // Fade out all audio before loading Chapter 6
        if (window.audioController) {
          window.audioController.fadePiano(0, 1500);
          window.audioController.fadeTrack('rain', 0, 1500);
          window.audioController.fadeTrack('static', 0, 1500);
          window.audioController.fadeTrack('breathing', 0, 1500);
        }

        setTimeout(() => {
          window.location.href = 'chapter6.html';
        }, 1500);
      }, 6000);
    }
  </script>
</body>
</html>
